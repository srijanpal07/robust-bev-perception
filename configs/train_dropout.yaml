task: velocity  # velocity | trajectory

data:
  meta_path: data/meta.json
  data_dir:  data/bevs
  dataset_kwargs:
    use_subframes:  false
    delta_bev:      false
    add_kinematics: true
    box_noise:      true
    box_noise_params:
      noise_scale: 1.0

# C2: stochastic beam dropout — NOT in dataset_kwargs (BEVVelocityDataset does not accept
# these yet). Wire into BEVVelocityDataset and train.py when beam_degradation.py is implemented.
# beam_dropout:
#   enabled: true
#   levels: [32, 16, 8, 4, 2, 0]

model:
  T:              3
  box_dim:        10
  hidden_size:    256
  dropout:        0.1
  bev_encoder:    resnet18
  crop_encoder:   lightweight
  bev_channels:   22
  crop_channels:  22
  temporal_model: transformer
  nhead:          4
  num_layers:     2
  dim_feedforward: 512

training:
  epochs:      80
  batch_size:  64
  lr:          1e-4
  weight_decay: 1e-4
  num_workers:  4
  output_dir:  outputs/dropout
